
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" role="img" aria-label="Tollgate">
    <title>Tollgate</title>

    <!-- 1. 外圈环（硬币边） -->
    <circle cx="500" cy="500" r="420" fill="none" stroke="#14F195" stroke-width="50"/>

    <!-- 2. 硬币正面（深色） -->
    <circle cx="500" cy="500" r="380" fill="#0F0F0F"/>

    <!-- 3. 内嵌细线（浮雕轮廓，让正面有"凿刻"质感） -->
    <circle cx="500" cy="500" r="335" fill="none" stroke="#14F195" stroke-width="2" opacity="0.25"/>

    <!-- 4. 「402」字样 -->
    <text x="500" y="525"
          text-anchor="middle"
          dominant-baseline="central"
          font-family="Inter, 'Geist Sans', 'Helvetica Neue', system-ui, sans-serif"
          font-weight="900"
          font-size="290"
          letter-spacing="-14"
          fill="#FFFFFF">402</text>

    <!-- 5. 底部小铭文（像真硬币边缘的标语） -->
    <text x="500" y="755"
          text-anchor="middle"
          dominant-baseline="central"
          font-family="'JetBrains Mono', 'Courier New', monospace"
          font-weight="700"
          font-size="32"
          letter-spacing="6"
          fill="#14F195"
          opacity="0.65">PAYMENT · REQUIRED</text>
  </svg>